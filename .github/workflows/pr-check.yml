name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sensitive data
        run: |
          # 检查是否有 token、密钥等敏感信息提交
          if grep -rE "(github_pat_|ghp_|sk-|password\s*=\s*['\"][^'\"]+['\"])" --include="*.py" --include="*.ts" --include="*.js" --include="*.env" .; then
            echo "❌ 检测到可能的敏感信息，请检查后重新提交"
            exit 1
          fi
          echo "✅ 未检测到敏感信息"

      - name: Validate spec docs
        run: |
          # 检查核心 spec 文件是否存在
          files=(
            ".kiro/specs/architecture.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ 缺少文件: $f"
              exit 1
            fi
          done
          echo "✅ Spec 文档完整"
