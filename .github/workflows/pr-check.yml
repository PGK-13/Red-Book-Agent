name: PR Check

on:
  pull_request:
    branches: [main, develop]

env:
  LOG_LEVEL: WARNING

jobs:
  # 1. 敏感信息检测
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sensitive data
        run: |
          # 只检查实际代码中的敏感信息模式，不检查注释/docstring
          if grep -rE "(github_pat_[A-Za-z0-9_]{20,}|ghp_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,})" --include="*.py" --include="*.ts" --include="*.js" --include="*.env" .; then
            echo "❌ 检测到可能的敏感信息，请检查后重新提交"
            exit 1
          fi
          echo "No sensitive data patterns detected."

      - name: Validate spec docs
        run: |
          for f in ".kiro/specs/architecture.md"; do
            if [ ! -f "$f" ]; then
              echo "Missing file: $f"
              exit 1
            fi
          done
          echo "✅ Spec 文档完整"

  # 2. 代码格式化检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install black isort

      - name: Check black formatting
        run: |
          echo "=== Black 格式化检查 ==="
          black --check --diff . || {
            echo "❌ Black 格式化失败，请运行 'black .' 修复"
            exit 1
          }
          echo "✅ Black 格式化通过"

      - name: Check isort imports
        run: |
          echo "=== isort 导入排序检查 ==="
          isort --check-only --diff . || {
            echo "❌ isort 导入排序失败，请运行 'isort .' 修复"
            exit 1
          }
          echo "✅ isort 导入排序通过"

  # 3. 类型检查
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install mypy

      - name: Run mypy
        run: |
          echo "=== mypy 类型检查 ==="
          cd backend
          mypy --explicit-package-bases app/services app/models app/schemas app/api --ignore-missing-imports || {
            echo "❌ mypy 类型检查失败"
            exit 1
          }
          echo "✅ mypy 类型检查通过"

  # 4. 数据库迁移检查
  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: redbook_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create test env
        run: |
          cd backend
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/redbook_test" > .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env

      - name: Check alembic migration
        run: |
          echo "=== Alembic 迁移检查 ==="
          cd backend
          alembic revision --autogenerate --message="dry_run" || true
          if git diff --name-only | grep -q "versions/"; then
            echo "❌ 检测到未应用的数据库迁移"
            git diff backend/app/db/migrations/versions/
            echo "请确保运行 'alembic upgrade head' 并提交迁移文件"
            exit 1
          fi
          echo "✅ 数据库迁移状态正常"

  # 5. 单元测试和属性测试
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: redbook_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create test env file
        run: |
          cd backend
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/redbook_test" > .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env
          echo "JWT_SECRET=test-secret-key-for-ci-only" >> .env
          echo "JWT_ALGORITHM=HS256" >> .env
          echo "JWT_EXPIRATION_MINUTES=30" >> .env
          echo "XHS_CLIENT_ID=test-client-id" >> .env
          echo "XHS_CLIENT_SECRET=test-client-secret" >> .env
          echo "PLAYWRIGHT_BROWSER=chromium" >> .env

      - name: Run unit tests
        run: |
          echo "=== 单元测试 ==="
          cd backend
          export DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/redbook_test
          export REDIS_URL=redis://localhost:6379/0
          pytest tests/test_account_service.py -v --tb=short || {
            echo "❌ 单元测试失败"
            exit 1
          }
          echo "✅ 单元测试通过"

      - name: Run property-based tests
        run: |
          echo "=== 属性测试 (Hypothesis) ==="
          cd backend
          export DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/redbook_test
          export REDIS_URL=redis://localhost:6379/0
          pytest tests/test_account_properties.py -v --tb=short --hypothesis-show-statistics --hypothesis-seed=0 || {
            echo "❌ 属性测试失败"
            exit 1
          }
          echo "✅ 属性测试通过"

      - name: Run API tests
        run: |
          echo "=== API 测试 ==="
          cd backend
          export DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/redbook_test
          export REDIS_URL=redis://localhost:6379/0
          pytest tests/test_account_api.py -v --tb=short || {
            echo "⚠️ API 测试未通过，请检查 API 路由实现"
            exit 1
          }
          echo "✅ API 测试通过"

  # 6. 需求覆盖检查
  requirements-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check requirements coverage
        run: |
          echo "=== 需求覆盖检查 ==="
          # 使用主分支作为基准进行比较
          BASE_REF="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_REF" "$HEAD_REF" -- '*.py' | grep -v __pycache__ | grep -v test_ || true)
          echo "修改的 Python 文件:"
          echo "$CHANGED_FILES"

          # 检查关键文件是否有修改
          for file in $CHANGED_FILES; do
            case "$file" in
              *services/account_service.py)
                echo "✅ account_service.py 已修改"
                ;;
              *models/account.py)
                echo "✅ models/account.py 已修改"
                ;;
              *schemas/account.py)
                echo "✅ schemas/account.py 已修改"
                ;;
              *api/v1/accounts.py)
                echo "✅ accounts.py API 路由已修改"
                ;;
            esac
          done

          echo "✅ 需求覆盖检查完成"

  # 7. AI Bug 检测
  ai-bug-scan:
    runs-on: ubuntu-latest
    needs: [security-scan, lint, type-check]
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Run AI Bug Detection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          echo "=== AI Bug 检测 ==="

          BASE_REF="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.sha }}"
          DIFF_CONTENT=$(git diff "$BASE_REF" "$HEAD_REF" -- '*.py' || true)

          if [ -z "$DIFF_CONTENT" ]; then
            echo "No Python changes detected, skipping AI scan"
            exit 0
          fi

          # 将 diff 内容写入临时文件，避免 YAML 解析问题
          echo "$DIFF_CONTENT" > /tmp/pr_diff.txt

          python3 .github/workflows/scripts/ai_review.py

  # 8. 汇总所有检查结果
  ci-success:
    runs-on: ubuntu-latest
    needs: [security-scan, lint, type-check, migration-check, test, requirements-coverage]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "=== PR Check 汇总 ==="
          echo ""
          echo "security-scan: ${{ needs.security-scan.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "type-check: ${{ needs.type-check.result }}"
          echo "migration-check: ${{ needs.migration-check.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "requirements-coverage: ${{ needs.requirements-coverage.result }}"
          echo ""

          if [ "${{ needs.security-scan.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.migration-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.requirements-coverage.result }}" != "success" ]; then
            echo "❌ 部分检查失败，请查看上方日志"
            exit 1
          else
            echo "✅ 所有检查通过!"
          fi
