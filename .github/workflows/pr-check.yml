name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sensitive data
        run: |
          # Check tracked source files for likely real secrets and avoid common false positives.
          pattern="(github_pat_[A-Za-z0-9_]{20,}|ghp_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|password\\s*=\\s*['\\\"][^'\\\"]{8,}['\\\"])"
          if git grep -nI -E "$pattern" -- '*.py' '*.ts' '*.js' '*.env'; then
            echo "Sensitive data may have been committed. Please review before merging."
            exit 1
          fi
          echo "No sensitive data patterns detected."

      - name: Validate spec docs
        run: |
          # Check that required spec docs exist.
          files=(
            ".kiro/specs/architecture.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing file: $f"
              exit 1
            fi
          done
          echo "Spec docs are complete."
