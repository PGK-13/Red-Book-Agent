services:
  postgres:
    image: postgres:16-alpine
    container_name: xhs_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xhs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhs_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-xhs_marketing}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xhs} -d ${POSTGRES_DB:-xhs_marketing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xhs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: xhs_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-xhs}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-xhs_dev_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: xhs_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xhs:xhs_dev_password@postgres:5432/xhs_marketing}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://xhs:xhs_dev_password@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.db.migrations_runner", "upgrade", "head"]
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: xhs_backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xhs:xhs_dev_password@postgres:5432/xhs_marketing}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://xhs:xhs_dev_password@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: xhs_worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xhs:xhs_dev_password@postgres:5432/xhs_marketing}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://xhs:xhs_dev_password@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["celery", "-A", "worker.celery_app:app", "worker", "--loglevel=info"]

  risk-bootstrap-check:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    profiles: ["verify"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xhs:xhs_dev_password@postgres:5432/xhs_marketing}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://xhs:xhs_dev_password@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "scripts/verify_risk_bootstrap.py"]
    restart: "no"

  risk-phase2-smoke-check:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    profiles: ["verify"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xhs:xhs_dev_password@postgres:5432/xhs_marketing}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://xhs:xhs_dev_password@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "scripts/verify_risk_phase2_smoke.py"]
    restart: "no"

  risk-performance-benchmark:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    profiles: ["verify"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://xhs:xhs_dev_password@postgres:5432/xhs_marketing}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://xhs:xhs_dev_password@rabbitmq:5672/}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "scripts/benchmark_risk_performance.py"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:
