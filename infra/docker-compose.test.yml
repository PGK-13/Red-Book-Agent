services:
  postgres-test:
    image: postgres:16-alpine
    container_name: xhs_postgres_test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xhs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xhs_dev_password}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-xhs_marketing_test}
    ports:
      - "55432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-xhs} -d ${POSTGRES_TEST_DB:-xhs_marketing_test}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
